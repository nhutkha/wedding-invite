databases:
  - name: wedding-invite-db
    plan: free
    databaseName: wedding_invite
    user: wedding_invite

services:
  - type: web
    name: wedding-invite-fullstack
    runtime: node
    rootDir: .
    plan: free
    buildCommand: npm ci && npm ci --prefix web && npm ci --prefix server && npm run build --prefix web
    startCommand: npm start --prefix server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-invite-db
          property: connectionString
      - key: PGSSL
        value: "true"
